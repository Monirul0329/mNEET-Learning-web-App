<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Unified Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] border border-white/5 shadow-2xl text-center space-y-5">
        <div>
            <h1 class="text-2xl font-black uppercase italic text-blue-500 tracking-tighter">mNEET ENTERPRISE</h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-1">Unified Access Management System</p>
        </div>

        <!-- Pure Text Input Form (Both for Student and Admin Router) -->
        <div class="space-y-3 text-left" id="credentialsStepBox">
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Name / Identity (Optional for Admin)</label>
                <input type="text" id="regName" placeholder="Enter Full Name..." class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs text-white font-bold mt-1">
            </div>
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Gmail Address (Verification Input)</label>
                <input type="email" id="regEmail" placeholder="username@gmail.com" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs text-white font-bold mt-1">
            </div>
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Mobile Phone Number / Admin Password</label>
                <!-- Kept text type to make sure everything is visible clearly during inputs -->
                <input type="text" id="regPhone" placeholder="Enter 10-digit Phone or Admin Pass" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs text-white font-bold mt-1">
            </div>
            <div id="dreamCollegeBox">
                <label class="text-[8px] font-black uppercase text-yellow-500 pl-1">🎯 Dream Medical College Goal (Optional for Admin)</label>
                <input type="text" id="regCollege" placeholder="e.g. AIIMS Delhi..." class="w-full p-4 rounded-2xl bg-yellow-500/5 border border-yellow-500/20 outline-none text-xs text-yellow-400 font-bold mt-1">
            </div>
            <button onclick="evaluateGatewayRoute()" class="w-full bg-blue-600 py-4 rounded-2xl text-xs font-black uppercase tracking-wider text-white mt-2 active:scale-95 transition-all">Secure Login Gateway</button>
        </div>

        <!-- Student OTP Validation Overlay Pop Block -->
        <div class="space-y-4 text-left hidden" id="verificationOtpStepBox">
            <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl text-center">
                <p class="text-[9px] font-black text-blue-400 uppercase">Verification System Dispatch Loop Safe</p>
                <p class="text-[7px] text-gray-400 uppercase mt-0.5">Use default authorization sequence: 1234</p>
            </div>
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Enter 4-Digit Validation Key</label>
                <input type="number" id="otpInputCode" placeholder="0 0 0 0" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-center text-sm tracking-widest text-white font-bold mt-1">
            </div>
            <button onclick="verifyOtpToken()" class="w-full bg-green-600 py-4 rounded-2xl text-xs font-black uppercase tracking-wider text-white active:scale-95 transition-all">Verify & Boot Student Platform</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();

        let cachedProfilePayload = {};

        // Evaluates route target instantly
        function evaluateGatewayRoute() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const passwordOrPhone = document.getElementById('regPhone').value.trim();
            const college = document.getElementById('regCollege').value.trim();

            if (!email || !passwordOrPhone) {
                return alert("Please input your Gmail and Phone/Password properly!");
            }

            // 1. MASTER ADMIN FILTER ROUTE
            if (email === "admin@mneet.com" && passwordOrPhone === "mneet2026") {
                alert("Master Admin Verified! Redirecting to Control Hub...");
                window.location.replace("./admin_dashboard.html");
                return;
            }

            // 2. STANDARD STUDENT FILTER ROUTE
            if (!name || passwordOrPhone.length < 10 || !college) {
                return alert("Students must provide Name, 10-digit Phone, and Dream College Goal!");
            }

            cachedProfilePayload = { name, email, phone: passwordOrPhone, dreamCollege: college };
            document.getElementById('credentialsStepBox').classList.add('hidden');
            document.getElementById('verificationOtpStepBox').classList.remove('hidden');
        }

        function verifyOtpToken() {
            const token = document.getElementById('otpInputCode').value;
            if(token !== "1234") return alert("Invalid secure gateway validation token!");

            const safePhone = cachedProfilePayload.phone.replace(/[^0-9]/g, "");
            localStorage.setItem('mUserPhone', safePhone);
            localStorage.setItem('mUserName', cachedProfilePayload.name);
            localStorage.setItem('mUserEmail', cachedProfilePayload.email);

            database.ref(`students/${safePhone}`).update({
                name: cachedProfilePayload.name,
                email: cachedProfilePayload.email,
                phone: cachedProfilePayload.phone,
                dreamCollege: cachedProfilePayload.dreamCollege,
                coins: 100, xp: 10, hoursSpent: 0, questionsSolved: 0, timestamp: Date.now()
            }).then(() => { location.href = 'dashboard.html'; });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
