<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEET Portal Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Exact color matrix cloning from 1000057444.jpg template design */
        body { background-color: #0c1322; color: white; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .mneet-card { background-color: #1c2742; border-radius: 3rem; width: 100%; max-width: 360px; padding: 2.5rem 2rem; box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.03); }
        .mneet-input { background-color: #0f182e; border: 1px solid #2a3b5c; border-radius: 1.25rem; outline: none; padding: 1.1rem 1.25rem; font-size: 13px; color: white; font-weight: 500; width: 100%; box-sizing: border-box; }
        .mneet-input::placeholder { color: #5f7495; font-weight: 500; }
        .mneet-input:focus { border-color: #f6b916; background-color: #0c1322; }
        .mneet-btn { background-color: #f6b916; color: #0c1322; font-weight: 900; font-size: 13px; letter-spacing: 0.05em; border-radius: 1.25rem; padding: 1.1rem; width: 100%; transition: all 0.2s ease; border: none; cursor: pointer; }
        .mneet-btn:active { transform: scale(0.97); opacity: 0.9; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="mneet-card text-center space-y-7">
        
        <div class="italic tracking-tighter select-none my-2">
            <span class="text-4xl font-black text-white">M</span><span class="text-4xl font-black text-[#f6b916]">NEET</span>
        </div>

        <div class="space-y-4 text-left" id="signInFormBox">
            <div>
                <input type="text" id="loginUserKey" placeholder="monirulgen45@gmail.com" class="mneet-input">
            </div>
            <div>
                <input type="password" id="loginPassword" placeholder="••••••••••••" class="mneet-input">
            </div>
            <div class="text-right px-1">
                <button onclick="switchView('forgot')" class="text-[9px] font-black uppercase text-red-400/80 hover:underline tracking-wider">Forgot Password?</button>
            </div>
            <button onclick="executeSignInAuthentication()" class="mneet-btn mt-2">SIGN IN</button>
            <p class="text-[10px] text-gray-400 font-bold tracking-wider text-center pt-2">NEW SURGEON? <button onclick="switchView('signup')" class="text-[#f6b916] font-black uppercase hover:underline">SIGN UP</button></p>
        </div>

        <div class="space-y-4 text-left hidden" id="signUpFormBox">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="signName" placeholder="Full Name" class="mneet-input !p-3.5">
                <input type="email" id="signEmail" placeholder="Gmail Link" class="mneet-input !p-3.5">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="tel" id="signPhone" placeholder="10-Digit Phone" class="mneet-input !p-3.5">
                <input type="text" id="signCity" placeholder="Your City" class="mneet-input !p-3.5">
            </div>
            <div>
                <input type="text" id="signCollege" placeholder="🎯 Dream Medical College Goal" class="mneet-input !p-3.5 text-yellow-400 font-bold">
            </div>
            <div>
                <input type="password" id="signPassword" placeholder="Create Account Password" class="mneet-input !p-3.5">
            </div>
            <button onclick="triggerSignUpOtpPipeline()" class="mneet-btn !py-3.5 mt-1">REGISTER & GET OTP</button>
            <p class="text-[10px] text-gray-400 font-bold tracking-wider text-center pt-1">ALREADY REGISTERED? <button onclick="switchView('signin')" class="text-[#f6b916] font-black uppercase hover:underline">SIGN IN</button></p>
        </div>

        <div class="space-y-4 text-left hidden" id="otpVerificationFormBox">
            <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl text-center">
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Mobile Verification Active</p>
                <p class="text-[8px] text-gray-400 uppercase mt-0.5 font-bold">Default Verification Code: 1234</p>
            </div>
            <div>
                <input type="number" id="otpVerificationInput" placeholder="0 0 0 0" class="mneet-input text-center text-base tracking-widest font-black">
            </div>
            <button onclick="completeSignUpProcess()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-wider transition-all">VERIFY OTP & SYNC</button>
        </div>

        <div class="space-y-4 text-left hidden" id="forgotPasswordFormBox">
            <div class="p-3 bg-red-500/10 border border-red-500/20 rounded-2xl text-center">
                <p class="text-[9px] font-black text-red-400 uppercase tracking-wider">Account Discovery Tracer</p>
            </div>
            <div>
                <input type="text" id="forgotKeyInput" placeholder="Enter Registered Gmail or Phone..." class="mneet-input">
            </div>
            <button onclick="executePasswordRecoveryDiscovery()" class="mneet-btn">DISPATCH RECOVERY CODE</button>
            <button onclick="switchView('signin')" class="w-full text-center text-[9px] font-black uppercase text-gray-500 tracking-widest pt-1">BACK TO SIGN IN</button>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let registrationPayloadCache = {};

        function switchView(target) {
            document.getElementById('signInFormBox').classList.add('hidden');
            document.getElementById('signUpFormBox').classList.add('hidden');
            document.getElementById('otpVerificationFormBox').classList.add('hidden');
            document.getElementById('forgotPasswordFormBox').classList.add('hidden');

            if (target === 'signin') document.getElementById('signInFormBox').classList.remove('hidden');
            if (target === 'signup') document.getElementById('signUpFormBox').classList.remove('hidden');
            if (target === 'forgot') document.getElementById('forgotPasswordFormBox').classList.remove('hidden');
        }

        // ================= SIGN UP FLOW REGISTRATION METRICS =================
        function triggerSignUpOtpPipeline() {
            const name = document.getElementById('signName').value.trim();
            const email = document.getElementById('signEmail').value.trim().toLowerCase();
            const phone = document.getElementById('signPhone').value.trim();
            const city = document.getElementById('signCity').value.trim();
            const college = document.getElementById('signCollege').value.trim();
            const pass = document.getElementById('signPassword').value;

            if(!name || !email || phone.length < 10 || !city || !college || !pass) {
                return alert("Please check and fill all parameters fully!");
            }

            const cleanPhone = phone.replace(/[^0-9]/g, "");
            
            db.ref(`students/${cleanPhone}`).once('value', snap => {
                if(snap.exists()) return alert("Operational Error: Phone code node already active!");
                
                registrationPayloadCache = { name, email, phone: cleanPhone, city, dreamCollege: college, password: pass };
                document.getElementById('signUpFormBox').classList.add('hidden');
                document.getElementById('otpVerificationFormBox').classList.remove('hidden');
            });
        }

        function completeSignUpProcess() {
            const otpCode = document.getElementById('otpVerificationInput').value;
            if(otpCode !== "1234") return alert("Invalid handshake key configuration verification failed!");

            db.ref(`students/${registrationPayloadCache.phone}`).set({
                name: registrationPayloadCache.name,
                email: registrationPayloadCache.email,
                phone: registrationPayloadCache.phone,
                city: registrationPayloadCache.city,
                dreamCollege: registrationPayloadCache.dreamCollege,
                password: registrationPayloadCache.password,
                role: "student", // Dynamic data control switch tag node
                coins: 100, xp: 10, hoursSpent: 0, questionsSolved: 0, timestamp: Date.now()
            }).then(() => {
                alert("Account verification done! Syncing system database loops...");
                localStorage.setItem('mUserPhone', registrationPayloadCache.phone);
                localStorage.setItem('mUserName', registrationPayloadCache.name);
                location.href = 'dashboard.html';
            }).catch(err => alert("Database Sync Anomaly: " + err.message));
        }

        // ================= MULTI-ROUTE DISPATCH SIGN IN AUTHENTICATION =================
        function executeSignInAuthentication() {
            const userKey = document.getElementById('loginUserKey').value.trim().toLowerCase();
            const inputPass = document.getElementById('loginPassword').value;

            if(!userKey || !inputPass) return alert("Please type your login inputs validation parameters properly!");

            let queryRef = db.ref(`students`);
            let userMatchNode = null;

            queryRef.once('value', snap => {
                if(!snap.exists()) return alert("Database connection tracking nodes empty!");

                snap.forEach(child => {
                    const record = child.val();
                    if(child.key === userKey || record.email === userKey) userMatchNode = record;
                });

                if(userMatchNode) {
                    if(userMatchNode.password === inputPass) {
                        
                        // CENTRAL PURE DATABASE CONTROLLER TRIGGER INTERFACE BYPASS:
                        if(userMatchNode.role === "admin") {
                            alert("Master Access Approved! Opening Control Commands Dashboard Panel Hub...");
                            window.location.replace("./admin_dashboard.html");
                        } else {
                            localStorage.setItem('mUserPhone', userMatchNode.phone);
                            localStorage.setItem('mUserName', userMatchNode.name);
                            localStorage.setItem('mUserEmail', userMatchNode.email);
                            location.href = 'dashboard.html';
                        }
                    } else { alert("Access Denied: Invalid Password Signature!"); }
                } else { alert("Identity Lookup Failure: No registered data nodes connect to this input."); }
            });
        }

        // ================= BACKEND PASSWORD RECOVERY LINK TRACERS =================
        function executePasswordRecoveryDiscovery() {
            const recoveryKey = document.getElementById('forgotKeyInput').value.trim().toLowerCase();
            if(!recoveryKey) return alert("Discovery query can't be blank!");

            db.ref(`students`).once('value', snap => {
                let match = null; if(!snap.exists()) return;
                snap.forEach(child => {
                    const data = child.val();
                    if(child.key === recoveryKey || data.email === recoveryKey) match = data;
                });

                if(match) {
                    if(recoveryKey.includes("@")) {
                        alert(`Recovery Alert: Password tokens sent to Gmail registry server: [ ${match.email} ]\nAccount Key Password: ${match.password}`);
                    } else {
                        alert(`Recovery Alert: Password tokens sent via SMS data routing to: [ +91 ${match.phone} ]\nAccount Key Password: ${match.password}`);
                    }
                    switchView('signin');
                } else { alert("Lookup Error: Credentials parameters logic matrix unmatched inside stack nodes."); }
            });
        }

        if ('serviceWorker' in navigator) {
            window.navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
