<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Telemetry Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="location.href='admin_dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="text-xs font-black text-green-400 uppercase tracking-widest">Student Telemetry Control</h2>
        <div class="w-10"></div>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-4" id="telemetryStudentsContainer">
        <p class="text-center text-gray-600 text-[10px] uppercase py-10 font-black tracking-widest">Compiling active user database grids...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        function runLiveTelemetrySync() {
            db.ref(`students`).on('value', snap => {
                const container = document.getElementById('telemetryStudentsContainer'); container.innerHTML = "";
                if(!snap.exists()) { container.innerHTML = '<p class="text-center text-xs text-gray-600 py-10">No Aspirant Profiles Logged</p>'; return; }

                snap.forEach(child => {
                    const s = child.val();
                    container.innerHTML += `
                        <div class="glass p-5 rounded-[2.2rem] border border-white/5 space-y-3 shadow-xl">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400 text-xs font-black">${(s.name || "A").charAt(0).toUpperCase()}</div>
                                    <div>
                                        <h4 class="text-xs font-black uppercase italic text-white">${s.name || 'Anonymous'}</h4>
                                        <p class="text-[7px] text-gray-500 font-bold mt-0.5">🎯 TARGET GOAL: ${s.dreamCollege || 'AIIMS Delhi'}</p>
                                    </div>
                                </div>
                                <div class="bg-yellow-500/10 px-2.5 py-1 rounded-full text-[8px] font-black italic text-yellow-400 border border-yellow-500/20">🪙 ${s.coins || 0}</div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5 text-[8px] font-black uppercase text-gray-400">
                                <p><i class="fa-solid fa-clock text-blue-400 mr-1"></i> Time Spent: <span class="text-white">${s.hoursSpent || 0}m</span></p>
                                <p><i class="fa-solid fa-circle-check text-purple-400 mr-1"></i> Solved MCQs: <span class="text-white">${s.questionsSolved || 0}</span></p>
                            </div>
                        </div>`;
                });
            });
        }
        runLiveTelemetrySync();
    </script>
</body>
</html>
