<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .story-ring { background: linear-gradient(to right, #eab308, #ef4444, #3b82f6); padding: 2px; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2 mt-4">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black text-sm" id="profileBadgeText">U</div>
            <div>
                <h1 class="text-xs font-black uppercase italic tracking-wide text-white" id="profileDashboardUserTitle">Loading Profile...</h1>
                <p class="text-[8px] text-yellow-500 font-black uppercase tracking-wider mt-0.5"><i class="fa-solid fa-building-columns mr-1"></i> TARGET: <span id="dreamCollegeHeadlineText">AIIMS Delhi</span></p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="terminateUserSessionGateway()" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 border border-red-500/20 flex items-center justify-center text-xs active:scale-90 transition-all" title="Secure Exit Account Session Layer"><i class="fa-solid fa-power-off"></i></button>
            <div class="bg-yellow-500/10 px-3.5 py-1.5 rounded-full text-[10px] font-black italic border border-yellow-500/20 text-yellow-400">🪙 <span id="walletCoinText">0</span></div>
        </div>
    </div>

    <div class="px-2 mb-6 flex items-center gap-4">
        <div class="flex flex-col items-center space-y-1 cursor-pointer" onclick="launchMotivationalStoryPopup('Stay focused! Mitosis cycle equations need complete revisions today.', 'Admin Audio Note')">
            <div class="w-12 h-12 rounded-full story-ring"><div class="w-full h-full bg-[#070b14] rounded-full flex items-center justify-center text-white text-xs"><i class="fa-solid fa-bolt-lightning text-yellow-400"></i></div></div>
            <span class="text-[6px] uppercase font-black text-gray-400 tracking-wider">Motivation</span>
        </div>
    </div>

    <div class="glass p-5 rounded-[2rem] border border-white/5 text-center mx-1 mb-6">
        <p class="text-[7px] font-black tracking-widest uppercase text-gray-500 mb-2 italic">🔴 MICROSCOPIC TARGET COUNTDOWN CLOCK</p>
        <div class="grid grid-cols-4 gap-2">
            <div class="bg-black/30 p-2 rounded-xl"><h3 id="daysDisplay" class="text-base font-black italic leading-none">00</h3><span class="text-[5px] text-gray-500 uppercase font-bold block mt-1">Days</span></div>
            <div class="bg-black/30 p-2 rounded-xl"><h3 id="hoursDisplay" class="text-base font-black italic leading-none">00</h3><span class="text-[5px] text-gray-500 uppercase font-bold block mt-1">Hours</span></div>
            <div class="bg-black/30 p-2 rounded-xl"><h3 id="minsDisplay" class="text-base font-black italic leading-none">00</h3><span class="text-[5px] text-gray-500 uppercase font-bold block mt-1">Mins</span></div>
            <div class="bg-black/30 p-2 rounded-xl"><h3 id="secsDisplay" class="text-base font-black italic text-red-500 leading-none">00</h3><span class="text-[5px] text-gray-500 uppercase font-bold block mt-1">Secs</span></div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 px-1 mb-6">
        <div class="glass p-3 rounded-2xl text-center border-b-2 border-blue-500/40">
            <i class="fa-solid fa-clock text-blue-500 text-xs mb-1"></i>
            <h4 class="text-[10px] font-black text-white" id="statsHoursText">0m</h4><span class="text-[5px] text-gray-500 uppercase font-bold block mt-0.5">Study Time</span>
        </div>
        <div class="glass p-3 rounded-2xl text-center border-b-2 border-purple-500/40">
            <i class="fa-solid fa-vial text-purple-400 text-xs mb-1"></i>
            <h4 class="text-[10px] font-black text-white" id="statsMcqText">0</h4><span class="text-[5px] text-gray-500 uppercase font-bold block mt-0.5">MCQs Solved</span>
        </div>
        <div class="glass p-3 rounded-2xl text-center border-b-2 border-green-500/40">
            <i class="fa-solid fa-award text-green-400 text-xs mb-1"></i>
            <h4 class="text-[7px] font-black text-green-400 uppercase truncate" id="statsRankBadgeText">Aspirant</h4><span class="text-[5px] text-gray-500 uppercase font-bold block mt-1">Medical Rank</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-1">
        <div onclick="location.href='study_zone.html'" class="glass p-5 rounded-[2rem] border-b-4 border-blue-500 flex flex-col justify-between h-28 active:scale-95 transition-all cursor-pointer"><div class="w-9 h-9 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500 text-xs"><i class="fa-solid fa-user-doctor"></i></div><div><h4 class="text-xs font-black uppercase italic text-white leading-none">Study Zone</h4><p class="text-[6px] text-gray-500 uppercase mt-1 font-black">Revision Matrix</p></div></div>
        <div onclick="location.href='quiz.html'" class="glass p-5 rounded-[2rem] border-b-4 border-purple-500 flex flex-col justify-between h-28 active:scale-95 transition-all cursor-pointer"><div class="w-9 h-9 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 text-xs"><i class="fa-solid fa-stopwatch-20"></i></div><div><h4 class="text-xs font-black uppercase italic text-white leading-none">Speed Simulator</h4><p class="text-[6px] text-gray-500 uppercase mt-1 font-black">Practice Run</p></div></div>
    </div>

    <div id="storyPopupModalOverlay" class="fixed inset-0 bg-black/95 z-[200] hidden items-center justify-center p-6 text-white" onclick="closeStoryPopup()">
        <div class="w-full max-w-sm text-center p-6 space-y-6" onclick="event.stopPropagation()">
            <div class="h-1 w-full bg-white/20 rounded-full overflow-hidden"><div class="h-full bg-yellow-500 animate-pulse" style="width: 100%"></div></div>
            <p id="storyMessageBodyText" class="text-sm font-black italic leading-relaxed text-slate-100"></p>
            <button onclick="closeStoryPopup()" class="text-[9px] text-gray-500 font-black uppercase tracking-wider">Tap Screen To Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        const userPhone = localStorage.getItem('mUserPhone');

        function startDashboardSync() {
            if(!userPhone) return location.href = 'index.html';
            const safePhone = userPhone.replace(/[^0-9]/g, "");

            database.ref(`students/${safePhone}`).on('value', snap => {
                const data = snap.val() || {};
                document.getElementById('profileDashboardUserTitle').innerText = data.name || "Aspirant";
                document.getElementById('profileBadgeText').innerText = (data.name || "A").charAt(0).toUpperCase();
                document.getElementById('dreamCollegeHeadlineText').innerText = data.dreamCollege || "Not Configured";
                document.getElementById('walletCoinText').innerText = data.coins || 0;
                document.getElementById('statsHoursText').innerText = (data.hoursSpent || 0) + "m";
                document.getElementById('statsMcqText').innerText = data.questionsSolved || 0;

                const xp = data.xp || 0;
                let activeRank = "Aspirant";
                if(xp > 100) activeRank = "Med Student"; if(xp > 300) activeRank = "Intern"; if(xp > 600) activeRank = "House Staff";
                if(xp > 1000) activeRank = "Resident"; if(xp > 1500) activeRank = "Registrar"; if(xp > 2200) activeRank = "Specialist";
                if(xp > 3000) activeRank = "Consultant"; if(xp > 4000) activeRank = "Professor"; if(xp > 5500) activeRank = "Surgeon General";
                document.getElementById('statsRankBadgeText').innerText = activeRank;
            });
        }

        function calculateCountdown() {
            const examTimestamp = new Date("May 3, 2026 14:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime(); const diff = examTimestamp - now;
                if(diff <= 0) return;
                document.getElementById('daysDisplay').innerText = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hoursDisplay').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById('minsDisplay').innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('secsDisplay').innerText = Math.floor((diff % (1000*60)) / 1000);
            }, 1000);
        }

        function launchMotivationalStoryPopup(msg, src) {
            document.getElementById('storyMessageBodyText').innerText = msg;
            document.getElementById('storyPopupModalOverlay').style.display = 'flex';
        }
        function closeStoryPopup() { document.getElementById('storyPopupModalOverlay').style.display = 'none'; }

        // Secure state destroy algorithm configuration
        function terminateUserSessionGateway() {
            if(confirm("Confirm to verify signature drop execution to safely logout profile storage arrays?")) {
                localStorage.clear();
                location.href = 'index.html';
            }
        }

        startDashboardSync(); calculateCountdown();
    </script>
</body>
</html>
