<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubt Support Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="location.href='admin_dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="text-xs font-black text-purple-400 uppercase tracking-widest">Incoming Doubts Helpdesk</h2>
        <div class="w-10"></div>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-4" id="adminDoubtQueueDisplayWrapper">
        <p class="text-center text-gray-600 text-[10px] uppercase py-10 font-black tracking-widest">Syncing active academic query queues...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();

        function startDoubtQueueTracking() {
            database.ref(`doubtsQueue`).on('value', snap => {
                const wrapper = document.getElementById('adminDoubtQueueDisplayWrapper'); wrapper.innerHTML = "";
                if(!snap.exists()) { wrapper.innerHTML = '<p class="text-center text-xs text-gray-600 py-10 uppercase font-black">All doubt queues cleared! No incoming requests.</p>'; return; }

                snap.forEach(child => {
                    const d = child.val();
                    wrapper.innerHTML += `
                        <div class="glass p-5 rounded-[2.2rem] border border-white/5 space-y-3 shadow-md bg-gradient-to-br from-purple-500/5 to-transparent">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[6px] font-black uppercase bg-purple-500/10 text-purple-400 px-2 py-0.5 rounded tracking-wider">Ref Topic: ${d.topicReference}</span>
                                    <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Student Contact Phone: ${d.studentPhone}</p>
                                </div>
                                <button onclick="wipeResolvedDoubtStream('${child.key}')" class="px-3 py-1 bg-green-600/10 border border-green-500/20 text-green-500 rounded-xl font-black text-[7px] uppercase tracking-wider active:scale-90 transition-all"><i class="fa-solid fa-check-double mr-1"></i> Resolve</button>
                            </div>
                            <div class="p-3 bg-black/40 rounded-xl border border-white/5 text-xs text-slate-200 font-medium leading-relaxed italic">"${d.doubtMessage}"</div>
                        </div>`;
                });
            });
        }

        function wipeResolvedDoubtStream(nodeKey) {
            if(confirm("Confirm validation parameter sweep checks to mark this student academic doubt resolved?")) {
                database.ref(`doubtsQueue/${nodeKey}`).remove().then(() => alert("Doubt target stack node successfully cleared!"));
            }
        }
        startDoubtQueueTracking();
    </script>
</body>
</html>
