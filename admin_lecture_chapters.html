<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Content Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
    </style>
</head>
<body class="pb-24">

    <!-- Sticky Top Navbar Bar Frame Layout Control Navigation -->
    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="location.href='admin_dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest">Lecture Content Manager</h2>
        <div class="w-10"></div>
    </div>

    <!-- Active Structural Inputs Injection Form Module Grid Map -->
    <div class="p-4 max-w-lg mx-auto space-y-6">
        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-white/5 shadow-2xl space-y-3">
            <p class="text-[8px] font-black uppercase text-gray-500 text-center tracking-widest">Inject Video Streams & Sheet URL Nodes</p>
            
            <input type="text" id="lectureChName" placeholder="Chapter Name (e.g. Biomolecules)" class="w-full glass-input p-3.5 rounded-xl text-xs font-bold">
            <input type="url" id="lectureVideoUrl" placeholder="YouTube Video Lecture Stream Link URL" class="w-full glass-input p-3 rounded-xl text-[10px]">
            <input type="url" id="lectureNotesUrl" placeholder="Class Summary Revision Notes File Link PDF URL" class="w-full glass-input p-3 rounded-xl text-[10px]">
            <input type="url" id="lectureDppUrl" placeholder="Daily Worksheet Practice DPP Document PDF URL" class="w-full glass-input p-3 rounded-xl text-[10px]">

            <button onclick="publishLectureAssetsPack()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-md active:scale-95 transition-all">Publish Resource Assets Pack</button>
        </div>

        <div class="space-y-3" id="adminActiveLecturesListWrapper"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const batchId = "B001";

        function publishLectureAssetsPack() {
            const name = document.getElementById('lectureChName').value.trim();
            const video = document.getElementById('lectureVideoUrl').value.trim();
            const notes = document.getElementById('lectureNotesUrl').value.trim();
            const dpp = document.getElementById('lectureDppUrl').value.trim();

            if(!name || !video) return alert("Chapter Name and at least core Video streams url logic maps must be verified valid!");

            db.ref(`courses/${batchId}/lectures`).push({
                chapterTitle: name, videoUrl: video, notesUrl: notes, dppUrl: dpp, timestamp: Date.now()
            }).then(() => {
                alert("Lecture asset packets compiled live successfully!");
                document.getElementById('lectureChName').value = ""; document.getElementById('lectureVideoUrl').value = "";
                document.getElementById('lectureNotesUrl').value = ""; document.getElementById('lectureDppUrl').value = "";
            });
        }

        function syncActiveLectures() {
            db.ref(`courses/${batchId}/lectures`).on('value', snap => {
                const wrapper = document.getElementById('adminActiveLecturesListWrapper'); wrapper.innerHTML = "";
                if(!snap.exists()) return;
                snap.forEach(child => {
                    const l = child.val();
                    wrapper.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] border border-white/5 flex justify-between items-center">
                            <div><h4 class="text-xs font-black uppercase italic text-white">${l.chapterTitle}</h4></div>
                            <button onclick="purgeLectureAssetNode('${child.key}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center"><i class="fa-solid fa-trash text-[9px]"></i></button>
                        </div>`;
                });
            });
        }
        function purgeLectureAssetNode(key) { if(confirm("Confirm to completely drop this structural content resource asset packet?")) db.ref(`courses/${batchId}/lectures/${key}`).remove(); }
        syncActiveLectures();
    </script>
</body>
</html>
