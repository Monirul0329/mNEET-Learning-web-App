<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] border border-white/5 shadow-2xl text-center space-y-5">
        <div>
            <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl mx-auto mb-3">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <h1 class="text-xl font-black uppercase italic text-blue-500 tracking-tighter">ADMIN GATEWAY</h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-1">Authorized Command Personnel Only</p>
        </div>

        <div class="space-y-3 text-left">
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Admin Email ID</label>
                <input type="email" id="admEmail" placeholder="admin@mneet.com" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs text-white font-bold mt-1">
            </div>
            <div>
                <label class="text-[8px] font-black uppercase text-gray-400 pl-1">Security Key Password</label>
                <input type="password" id="admPass" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs text-white font-bold mt-1">
            </div>
        </div>

        <button onclick="verifyAdminGate()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-xs font-black uppercase tracking-wider text-white shadow-lg active:scale-95 transition-all">
            Verify & Boot Control Deck
        </button>
    </div>

    <script>
        function verifyAdminGate() {
            const email = document.getElementById('admEmail').value.trim();
            const pass = document.getElementById('admPass').value;

            if (!email || !pass) {
                return alert("Please input master validation keys!");
            }

            // Explicit system verification parameters matrix matching check
            if (email === "mi4286803@gmail.com" && pass === "Tama@7602") {
                alert("Credentials Approved! Syncing admin data streams...");
                // Force routing to central command hub location
                window.location.replace("./admin_dashboard.html");
            } else {
                alert("Access Denied: Invalid Security Signature Tokens!");
            }
        }
    </script>
</body>
</html>
